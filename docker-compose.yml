services:
  api:
    image: node:22
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --dir apps/api dev"
    env_file:
      - .env
    ports:
      - "8080:8080"

  web:
    image: node:22
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --dir apps/web dev"
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  agent:
    image: python:3.12
    working_dir: /workspace/apps/agent
    volumes:
      - ./:/workspace
    command: sh -lc "python -m venv .venv && . .venv/bin/activate && pip install -U pip && pip install -r requirements.txt && python main.py --host 0.0.0.0 --port 52178"
    env_file:
      - .env
    ports:
      - "52178:52178"
    depends_on:
      - api
